name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Only install Chromium in CI to keep install time down.
      # Firefox and WebKit run locally (see playwright.config.ts).
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Public route tests — run against production, no auth needed
      - name: Run public E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          BASE_URL: https://yiwuwax.com

      # Auth-gated tests — only when test credentials are configured
      - name: Setup auth state
        if: ${{ env.TEST_USER_EMAIL != '' }}
        run: npx playwright test --project=setup
        env:
          CI: true
          BASE_URL: https://yiwuwax.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Run authenticated E2E tests
        if: ${{ env.TEST_USER_EMAIL != '' }}
        run: npx playwright test --project=chromium-auth
        env:
          CI: true
          BASE_URL: https://yiwuwax.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
