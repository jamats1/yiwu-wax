# Temporary: HTTP only until /etc/letsencrypt/live/yiwuwax.com/ exists.
# After: sudo cp /root/var/www/nextjs/yiwu-wax/nginx.conf /etc/nginx/sites-available/yiwuwax.com && sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_yiwuwax {
    server localhost:3002;
    keepalive 64;
}

server {
    listen 80;
    server_name yiwuwax.com www.yiwuwax.com;

    location / {
        proxy_pass http://nextjs_yiwuwax;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
